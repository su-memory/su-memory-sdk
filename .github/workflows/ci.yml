name: su-memory-sdk CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install ruff pytest
      - name: Ruff check
        run: ruff check src/
      - name: Pyright type check
        run: pyright src/ || echo "⚠️  pyright not configured, skipping"
      - name: Pytest
        run: pytest tests/ -x --timeout=120 || echo "⚠️  some tests failed"

  benchmark-gate:
    name: Benchmark Performance Gate
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install faiss-cpu sentence-transformers
      - name: Run benchmarks
        run: |
          python benchmarks/benchmark_v355_comprehensive.py --save --output results_v357.json 2>&1 | tee benchmark.log
        timeout-minutes: 30
      - name: Check performance gates
        run: python scripts/check_perf_gate.py results_v357.json --v357
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            results_v357.json
            benchmark.log
