name: su-memory CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'

defaults:
  run:
    shell: bash

jobs:
  # ===========================================================================
  # Job 1: Lint + Format Check
  # ===========================================================================
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lint tools
        run: pip install ruff

      - name: Ruff check
        run: ruff check src/

      - name: Ruff format check
        run: ruff format --check src/

  # ===========================================================================
  # Job 2: Type Check
  # ===========================================================================
  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install mypy
          pip install -e ".[dev]"

      - name: Run mypy
        run: mypy src/su_memory/_sys/_storage_backend.py src/su_memory/sdk/ src/su_memory/clinical/ src/su_memory/fhir/

  # ===========================================================================
  # Job 3: Unit Tests (matrix: 3.10, 3.11, 3.12)
  # ===========================================================================
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project
        run: pip install -e ".[dev]"

      - name: Run tests
        run: |
          # 离线套：跳过所有 integration 标记的测试（依赖外部服务）
          # 集成套由单独 job 触发（需 Ollama/DeepSeek/Qdrant/Redis/PG）
          python -m pytest tests/ \
            -v \
            --tb=short \
            --timeout=60 \
            -m "not integration" \
            --ignore=tests/integration/

      - name: Upload coverage (3.11 only)
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py311
          path: .pytest_cache/
          retention-days: 7

  # ===========================================================================
  # Job 4: Import verification (install + import all modules)
  # ===========================================================================
  import-check:
    name: Import Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install project
        run: pip install -e .

      - name: Verify imports
        run: |
          python -c "
          import su_memory
          import su_memory.sdk
          from su_memory.sdk import (
              MemoryProtocol, SuMemoryLite, SuMemoryLitePro,
              SqliteStorageBackend, StorageBackend,
          )
          from su_memory._sys._storage_backend import (
              BackendType, StorageConfig, create_backend,
          )
          print('All imports OK')
          print('Version:', su_memory.__version__)
          "
