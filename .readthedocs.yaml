# Read the Docs configuration file for su-memory
# See https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"

sphinx:
  configuration: docs/api/conf.py
  fail_on_warning: false

python:
  install:
    - requirements: docs/api/requirements.txt
    - method: pip
      path: .

formats:
  - htmlzip
  - pdf
